port: 7890
socks-port: 7891
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
external-ui: /usr/local/etc/clash/ui
secret: 123456

# ==================== TUN 模式（启用 DNS 劫持） ====================
tun:
  enable: true
  stack: system
  device: tun_3000
  mtu: 9000
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53

# ==================== DNS 配置（方案一标准：全部指向 MosDNS） ====================
dns:
  enable: true
  listen: 0.0.0.0:7853

  nameserver:
    - 127.0.0.1:5335                # MosDNS监听地址（不变）



  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

# ==================== 流量嗅探（完全保留） ====================
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.push.apple.com"
