plugins:
  ################## 数据源 ################
  - tag: geoip_private       # 私网 ip
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/geoip_private.txt"

  - tag: geoip_cn            # cn ip（保留但仅用于内网逻辑）
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/geoip_cn.txt"

  - tag: geosite_cn          # cn 域名（保留但不再用于DNS分支）
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/geosite_cn.txt"
        - "/usr/local/etc/mosdns/rule/whitelist.txt"

  - tag: geosite_gfw         # gfw 域名
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/geosite_gfw.txt"
        - "/usr/local/etc/mosdns/rule/greylist.txt"

  - tag: geosite_location-!cn  # 非 cn 域名
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/geosite_geolocation-!cn.txt"

  # - tag: geosite_ads-all    # 广告域名
  #   type: domain_set
  #   args:
  #     files:
  #       - "/usr/local/etc/mosdns/rule/geosite_category-ads-all.txt"

  - tag: hosts               # hosts
    type: hosts
    args:
      files:
        - "/usr/local/etc/mosdns/rule/hosts.txt"

  - tag: redirect            # 重定向
    type: redirect
    args:
      files:
        - "/usr/local/etc/mosdns/rule/redirect.txt"

  - tag: ddnslist            # ddns列表
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/ddnslist.txt"

  - tag: blocklist           # 域名黑名单
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/blocklist.txt"

  - tag: whitelist           # 白名单（强制走国内DNS）
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/whitelist.txt"