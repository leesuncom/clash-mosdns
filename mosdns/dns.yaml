plugins:
  ################ DNS 上游 #################
  # 国内DNS（纯IPv4 稳定版，兼容Clash，无IPv6报错）
  - tag: forward_domestic
    type: forward
    args:
      concurrent: 2
      upstreams:
        # 阿里云 DNS (纯IPv4)
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "223.6.6.6"
        - addr: "tls://dns.alidns.com"
          dial_addr: "223.6.6.6"
          enable_pipeline: false
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "223.5.5.5"
        - addr: "tls://dns.alidns.com"
          dial_addr: "223.5.5.5"
          enable_pipeline: false
        # DNSPod DNS (纯IPv4)
        - addr: "https://doh.pub/dns-query"
          dial_addr: "1.12.12.12"
          enable_pipeline: true

  # Clash DNS 7853（主上游）
  - tag: forward_openclash
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: https://cloudflare-dns.com/dns-query

  # 备用境外DNS 5353（备用上游）
  - tag: forward_dnscrypt
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: 127.0.0.1:5353

  # 本地DNS
  - tag: forward_local
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: 127.0.0.1:5355

  ################ 核心：原生自动切换 #################
  - tag: forward_overseas_auto
    type: fallback
    args:
      primary: forward_openclash
      secondary: forward_dnscrypt
      threshold: 200
      always_standby: false

  ################ 全局DNS缓存 ################
  - tag: cache_dns
    type: cache
    args:
      size: 65535
      lazy_cache_ttl: 86400

  ################ TTL 覆写 ################
  - tag: ttl_modify
    type: "sequence"
    args:
      - exec: ttl 3600-86400

  ################ 回滚机制 ################
  - tag: seq_backup
    type: sequence
    args:
      - exec: query_summary upstream error
      - exec: $forward_domestic
      - matches: has_resp
        exec: accept
      - matches: "!has_resp"
        exec: reject 2

  - tag: fallback_nocn
    type: fallback
    args:
      primary: forward_overseas_auto
      secondary: seq_backup
      threshold: 5000
      always_standby: false

  ################ 其他插件 ################
  - tag: ecs_cn
    type: "ecs_handler"
    args:
      forward: true
      send: true
      mask4: 24
      mask6: 48

  - tag: no_ecs
    type: "ecs_handler"
    args:
      forward: false
      preset: ""
      send: false
      mask4: 24
      mask6: 48