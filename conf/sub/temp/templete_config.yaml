#方案 1：AdGuard Home 前置 + MosDNS 中置 + Clash 后置（推荐）
#网络流向：客户端 → AdGuard Home (53 端口) → MosDNS (5300) → Clash (5333) → 加密 DNS (国内外分流)
#核心配置要点：
#AdGuard Home：监听 53 端口，关闭自身缓存，上游设置为 MosDNS，启用广告过滤和家长控制
#MosDNS：负责 GeoIP/GeoSite 分流，国内域名走阿里云 / 腾讯云 DOH，国外域名走 Clash 代理的 Cloudflare/Google DOH
#Clash：启用 TUN 模式和 Fake-IP，关闭 DNS 劫持，上游设置为加密 DNS，确保国外 DNS 请求必走代理

# ==================== 基础配置 ====================
port: 7890
socks-port: 7891
mode: rule
log-level: info                     # 可根据需要调整为 error
external-controller: 0.0.0.0:9090
external-ui: /usr/local/etc/clash/ui
secret: 123456                      # 如需认证，保留此行

# ==================== TUN 模式 ====================
# 启用 TUN，但不劫持 DNS（由 AdGuardHome / MosDNS 接管入口）
tun:
  enable: true
  stack: system
  device: tun_3000
  mtu: 9000
  auto-route: true
  strict-route: false               # 避免路由卡死
  auto-detect-interface: true
  # dns-hijack 已删除，DNS 劫持由 AdGuardHome 完成

# ==================== DNS 配置 ====================
dns:
  enable: true
  listen: 0.0.0.0:7853              # MosDNS 将国外域名查询发到此端口
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-persist: true             # 防止重启后映射丢失
  respect-rules: true
  use-hosts: true
  use-system-hosts: false

  # 节点解析（国内 DNS，直连）
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 国外 DNS：使用 DoH（直接 IP 形式，避免解析泄露）
  nameserver:
    - https://1.1.1.1/dns-query     # Cloudflare DoH
    - https://8.8.8.8/dns-query     # Google DoH
    - https://208.67.222.222/dns-query # OpenDNS DoH

  # fallback 可省略，但保留作为补充（仍使用 DoH）
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  # fallback 过滤（仅用于国内 IP 跳过 fallback，避免污染）
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

  # 基础解析（国内 DNS，直连）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

