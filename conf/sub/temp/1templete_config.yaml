# 基础代理配置（保留）
port: 7890
socks-port: 7891
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'

# TUN 模式（仅保留流量转发，关闭 DNS 劫持）
tun:
  enable: true
  stack: system
  device: tun_3000
  mtu: 9000
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53

# DNS 配置（MosDNS 全权接管 + 规避启动问题）
dns:
  enable: true
  listen: 127.0.0.1:7853
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  nameserver:
    - 127.0.0.1:5335     # 所有 DNS 查询都交给 MosDNS

# 流量嗅探（保留）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080, 8443, 8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.icloud.com"
    - "+.microsoft.com"
