  enable: true
  listen: 127.0.0.1:7853
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  nameserver:
    - 127.0.0.1:5335     # 所有 DNS 查询都交给 MosDNS

# 流量嗅探（保留）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080, 8443, 8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.icloud.com"
    - "+.microsoft.com"

