# 客户端 → AdGuardHome:53（5335mosdns） → MosDNS:5335(国外DNSCrypt-Proxy5353) → Clash:7853（上游5335）
# 基础配置
port: 7890
socks-port: 7891
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'

# 旁路由必须开 TUN！！！
tun:
  enable: true
  stack: mixed  # system
  device: tun_3000
  mtu: 9000
  auto-route: true
  strict-route: true #让 Clash TUN 强行接管设备所有流量，任何流量都不准绕过 Clash
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53

# DNS 配置（正确）
dns:
  enable: true
  listen: 0.0.0.0:7853
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: false
  respect-rules: false
  proxy-server-nameserver:
    - https://doh.pub/dns-query

  nameserver:
    - 127.0.0.1:5335   # 指向 MosDNS，绝对不能指回 MosDNS，关闭嗅探以防止潜在的循环
#    - 127.0.0.1:5353   # 指向 DNSCrypt，绝对不能指回 MosDNS，adg都绕过


