name: auto_delete

on:
  schedule:
    - cron: '0 2 10 * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List all releases (sort by newest first)
        id: list_releases
        run: |
          gh release list --limit 1000 | sort -k2,2r > releases.txt
          cat releases.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine releases to KEEP
        run: |
          set -euo pipefail
          current_month=$(date +'%Y-%m')
          # 改用普通数组 + 循环去重，避免哈希表兼容性问题
          keep_list=()

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            tag=$(echo "$line" | awk '{print $1}')
            rel_date=$(echo "$line" | awk '{print $3}')
            rel_month=$(date -d "$rel_date" +'%Y-%m' 2>/dev/null || echo "invalid")

            if [[ "$rel_month" == "$current_month" ]]; then
              # 规则1：保留本月所有发布
              keep_list+=("$tag")
            elif [[ "$rel_month" != "invalid" ]]; then
              # 规则2：非本月，取该月最后一个发布
              last_tag=$(grep "$rel_month" releases.txt | tail -n1 | awk '{print $1}')
              # 只有非空才加入
              if [ -n "$last_tag" ]; then
                keep_list+=("$last_tag")
              fi
            fi
          done < releases.txt

          # 数组去重
          declare -A seen
          unique_keep=()
          for tag in "${keep_list[@]}"; do
            if [ -z "${seen[$tag]-}" ]; then
              seen[$tag]=1
              unique_keep+=("$tag")
            fi
          done

          KEEP_LIST="${unique_keep[*]}"
          echo "KEEP_LIST=$KEEP_LIST" >> $GITHUB_ENV
          echo "✅ 保留列表：$KEEP_LIST"

      - name: Delete UNWANTED releases
        run: |
          KEEP_ARR=(${{ env.KEEP_LIST }})
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            tag=$(echo "$line" | awk '{print $1}')
            if [[ ! " ${KEEP_ARR[@]} " =~ " $tag " ]]; then
              echo "🗑️ 删除 release: $tag"
              gh release delete "$tag" -y 2>/dev/null || true
            fi
          done < releases.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Limit total releases to MAX 100
        run: |
          total=$(gh release list --limit 1000 | wc -l)
          if (( total > 5 )); then
            echo "⚠️ 当前总数 $total，超过100，清理最旧的 $((total-100)) 个"
            gh release list --limit 1000 | tail -n +101 | awk '{print $1}' | while read -r tag; do
              gh release delete "$tag" -y 2>/dev/null || true
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete orphan git tags
        run: |
          valid_tags=$(gh release list --limit 1000 | awk '{print $1}' | sort)
          git tag -l | while read -r tag; do
            if ! grep -qxF "$tag" <<< "$valid_tags"; then
              echo "🧹 删除孤儿标签: $tag"
              git tag -d "$tag" || true
              git push origin --delete "$tag" || true
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
