log:
  level: info
  file: "/var/log/mosdns.log"

api:
  http: "127.0.0.1:9091" # api 监听地址

include:
  - "/usr/local/etc/mosdns/dat_exec.yaml"
  - "/usr/local/etc/mosdns/dns.yaml"

plugins:
  ################ 查询序列 #################
  # cn 域名查询【防泄漏强化：国内域名必须返回国内IP，否则丢弃】
  - tag: query_cn
    type: sequence
    args:
      - exec: $ecs_cn
      - exec: $forward_domestic
      - matches: qname $ddnslist
        exec: return
      - matches: qname $whitelist
        exec: return
      - matches: "!resp_ip $geoip_cn" # 核心防泄漏：国内域名解析出国外IP
        exec: drop_resp # 直接丢弃，杜绝泄漏
      - matches: "!has_resp"
        exec: reject 2

  # GFW 域名查询【防泄漏：仅走Clash/DNSCrypt】
  - tag: query_gfw
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $fallback_openclash_dnscrypt
      - matches: has_resp
        exec: accept
      - matches: "!has_resp"
        exec: reject 2

  # 非 cn 域名查询【防泄漏：境外域名返回国内IP直接丢弃】
  - tag: query_nocn
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $fallback_nocn
      - matches: "resp_ip $geoip_cn" # 境外域名解析出国内IP = 泄漏
        exec: mark 10
      - matches: mark 10
        exec: query_summary drop_nocn
      - matches: mark 10
        exec: drop_resp # 丢弃污染/泄漏结果
      - matches: "!has_resp"
        exec: reject 2

  # 本地域名查询【防泄漏：私网域名绝不走公网DNS】
  - tag: query_lan
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $forward_local

  # 其他类型查询
  - tag: query_other_pre
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $forward_domestic
      - exec: query_summary query_other_pre

  # 漏网之鱼【防泄漏：仅走Clash/DNSCrypt，无国内旁路】
  - tag: query_other_main
    type: sequence
    args:
      - exec: $no_ecs
      - exec: $fallback_openclash_dnscrypt
      - exec: query_summary query_other_main
      - matches: has_resp
        exec: accept
      - matches: "!has_resp"
        exec: reject 2

  ################ 解析结果处理序列 #################
  - tag: pre_handle
    type: sequence
    args:
      - exec: accept

  - tag: main_handle
    type: sequence
    args:
      - matches: qname $ddnslist
        exec: ttl 5-5
      - matches: "!qname $ddnslist"
        exec: $ttl_modify
      - exec: accept

  - tag: has_resp_pre
    type: sequence
    args:
      - matches: has_resp
        exec: goto pre_handle

  - tag: has_resp_main
    type: sequence
    args:
      - matches: has_resp
        exec: goto main_handle

  ################ 主程序【顶级防泄漏预处理】 #################
  - tag: pre_sequence
    type: sequence
    args:
      # 屏蔽非法DNS请求，杜绝泄漏通道
      - matches: qtype 65
        exec: reject 3
      - matches: "qname keyword::"
        exec: reject 3
      - matches: qtype 0
        exec: reject 3
      # 黑名单域名直接拒绝
      - matches: qname $blocklist
        exec: reject 5

      # Hosts 优先
      - exec: $hosts
      - exec: jump has_resp_pre
      - exec: $redirect
      - exec: jump has_resp_pre

      # 私网PTR查询强制本地，严防内网泄漏
      - matches:
        - "qtype 12"
        - "ptr_ip $geoip_private"
        exec: $query_lan
      - exec: jump has_resp_pre

  # main_sequence 分流【无任何泄漏旁路】
  - tag: main_sequence
    type: sequence
    args:
      # 缓存优先：命中则直接返回，未命中则继续
      - exec: $cache_dns
      - exec: jump has_resp_main

      # DDNS/白名单/国内域名 → 国内DNS
      - matches: qname $ddnslist
        exec: $query_cn
      - exec: jump has_resp_main
      - matches: qname $whitelist
        exec: $query_cn
      - exec: jump has_resp_main
      - matches: qname $geosite_cn
        exec: $query_cn
      - exec: jump has_resp_main

      # GFW/境外域名 → Clash/DNSCrypt
      - matches: qname $geosite_gfw
        exec: $query_gfw
      - exec: jump has_resp_main
      - matches: qname $geosite_location-!cn
        exec: $query_nocn
      - exec: jump has_resp_main

      # 最终漏网之鱼 → 仅走Clash/DNSCrypt
      - exec: $query_other_main
      - exec: jump has_resp_main

  # 主入口
  - tag: sequence
    type: sequence
    args:
      - exec: $pre_sequence
      - exec: $main_sequence

  # 服务端口
  - type: udp_server
    args:
      entry: sequence
      listen: :5335
  - type: tcp_server
    args:
      entry: sequence
      listen: :5335