plugins:
  - tag: "cache_0"
    type: "cache"
    args:
      size: 4194304
      lazy_cache_ttl: 3600 
      dump_file: /usr/local/etc/mosdns/cache.dump
      dump_interval: 7200

  - tag: redirect
    type: redirect
    args:
      # rules:
      #   - cdn.jsdelivr.net cdn.jsdelivr.net.cdn.cloudflare.net
      files:
        - "/usr/local/etc/mosdns/rule/redirect.txt"

  - tag: "hosts"
    type: "hosts"
    args:
      # entries:
      #   - "google.com 108.177.122.113"
      files:
        - "/usr/local/etc/mosdns/rule/hosts.txt"

  - tag: "hosts_fastly"
    type: "hosts"
    args:
      files:
        - "/usr/local/etc/mosdns/rule/hosts_fastly.txt"

  - tag: "hosts_akamai"
    type: "hosts"
    args:
      files:
        - "/usr/local/etc/mosdns/rule/hosts_akamai.txt"

  - tag: geosite_cn # 国内域名
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/china_domain_list.txt" # https://raw.githubusercontent.com/pmkol/easymosdns/rules/china_domain_list.txt

  - tag: geoip_cn # 国内 IP
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/china_ip_list.txt" # https://raw.githubusercontent.com/pmkol/easymosdns/rules/china_ip_list.txt and https://raw.githubusercontent.com/Teacher-c/clash/main/data/CN-ip-cidr.txt|CN-ip-cidr.txt

  - tag: privatelist # 内网域名
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/private.txt" # https://raw.githubusercontent.com/Loyalsoldier/domain-list-custom/release/private.txt

  - tag: whitelist
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/white_list.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/white_list.txt

  - tag: blocklist
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/block_list.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/block_list.txt

  - tag: greylist # 用来存放被污染的域名。
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/grey_list.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/grey_list.txt

  - tag: ipv6list # 用来存放优先走 ipv6 的域名。
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/ipv6_domain_list.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/ipv6_domain_list.txt

  - tag: originallist # 用来存放优不进行 IP 优选的域名。
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/original_domain_list.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/original_domain_list.txt

  - tag: akamailist
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/akamai_domain_list.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/akamai_domain_list.txt

  - tag: cdnlist
    type: domain_set
    args:
      exps:
        - "cloudflare.com"
        - "cloudfront.net"
        - "microsoft.com"
        - "playstation.com"
        - "playstation.net"
        - "redhat.com"
        - "samsung.com"
        - "ubi.com"
        - "ubisoft.com"
        - "xboxlive.com"
      files:
        - "/usr/local/etc/mosdns/rule/cdn_domain_list.txt" # https://raw.githubusercontent.com/pmkol/easymosdns/rules/cdn_domain_list.txt

  - tag: jp_dns_list
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/jp_dns_list.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/jp_dns_list.txt

  - tag: us_dns_list
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/us_dns_list.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/us_dns_list.txt

  - tag: gfwlist
    type: domain_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/gfw.txt" # https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/gfw.txt
        - "/usr/local/etc/mosdns/rule/greatfire.txt" # https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/greatfire.txt
        - "/usr/local/etc/mosdns/rule/custom_list.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/custom_list.txt

  - tag: banned_ip
    type: ip_set
    args:
      ips:
        - "0.0.0.0/32"
        - "2001::/32"
      files:
        - "/usr/local/etc/mosdns/rule/gfw_ip_list.txt" # https://raw.githubusercontent.com/pmkol/easymosdns/rules/gfw_ip_list.txt
        - "/usr/local/etc/mosdns/rule/facebook.txt" # https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/facebook.txt
        # - "/usr/local/etc/mosdns/rule/telegram.txt" # https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/telegram.txt
        - "/usr/local/etc/mosdns/rule/twitter.txt" # https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/twitter.txt

  - tag: cachefly_ipv4
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/cachefly_ipv4.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/cachefly_ipv4.txt

  - tag: cloudflare_ipv4
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/ip.txt" # https://raw.githubusercontent.com/XIU2/CloudflareSpeedTest/master/ip.txt

  - tag: cloudflare_ipv6
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/ipv6.txt" # https://raw.githubusercontent.com/XIU2/CloudflareSpeedTest/master/ipv6.txt

  - tag: cloudfront_ipv4
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/cloudfront.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/cloudfront.txt

  - tag: cloudfront_ipv6
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/cloudfront_ipv6.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/cloudfront_ipv6.txt

  - tag: fastly_ip
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/fastly.txt" # https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/fastly.txt and https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/fastly.txt

  - tag: cdn77_ipv4
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/cdn77_ipv4.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/cdn77_ipv4.txt

  - tag: sucuri_ipv4
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/sucuri_ipv4.txt" # https://raw.githubusercontent.com/Journalist-HK/Rules/main/sucuri_ipv4.txt

  - tag: akamai_ipv4
    type: ip_set
    args:
      files:
        - "/usr/local/etc/mosdns/rule/Akamai_ipv4.txt" # https://raw.githubusercontent.com/Teacher-c/clash/main/data/Akamai_ipv4.txt


