# 基础代理配置（保留）
port: 7890
socks-port: 7891
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'

# TUN 模式（仅保留流量转发，关闭 DNS 劫持）
tun:
  enable: true
  stack: system
  device: tun_3000
  mtu: 9000
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53

# DNS 配置（MosDNS 全权接管 + 规避启动问题）
