plugins:
  # ===================== ECS 插件（优化境外解析）=====================
  - tag: ecs_jp
    type: ecs_handler
    args:
      forward: false
      preset: 13.78.0.0
      send: true
      mask4: 17

  - tag: ecs_sjc
    type: ecs_handler
    args:
      forward: false
      preset: 151.101.196.0
      send: true
      mask4: 22

  - tag: ecs_lax
    type: ecs_handler
    args:
      forward: false
      preset: 151.101.68.0  # 洛杉矶精准段
      send: true
      mask4: 22

  # ===================== 国内 DNS 上游（统一使用 forward_local）=====================
  - tag: forward_local
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "https://doh.pub/dns-query"
          dial_addr: "1.12.12.12"
        - addr: "tls://dot.pub:853"
          dial_addr: "120.53.53.53"

  - tag: forward_alidns
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "quic://dns.alidns.com"
        - addr: "https://dns.alidns.com/dns-query"
          dial_addr: "223.5.5.5"
          enable_http3: true

  # ===================== 境外 DNS 上游（全走 Clash 代理，防污染）=====================
  - tag: forward_remote
    type: forward
    args:
      concurrent: 3
      upstreams:
        - addr: "udp://127.0.0.1:5353"
          enable_pipeline: true

  # ===================== 解析序列（优化后）=====================
  - tag: remote_sequence
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $ecs_sjc
      - exec: $forward_remote

  - tag: remote_sequence_ipv6
    type: sequence
    args:
      - exec: prefer_ipv6
      - exec: $forward_remote

  - tag: has_resp_sequence
    type: sequence
    args:
      - matches:
          - has_resp
        exec: accept