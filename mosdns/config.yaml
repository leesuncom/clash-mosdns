# 更新脚本增强：在之前优化过的脚本中增加下载优选 IP 列表的步骤，例如从 https://github.com/Journalist-HK/Rules 或自定义源获取最新 IP。https://raw.githubusercontent.com/Teacher-c/clash/main/data/Akamai_ipv4.txt
# 建议编写外部脚本定期下载优选 IP，并替换下方 blackhole 序列中的 IP 列表，然后通过 API 或 SIGHUP 重载 MosDNS。

log:
  level: info  
  file: "/var/log/mosdns.log"

api:
  http: "127.0.0.1:9091" 

include: 
  - "/usr/local/etc/mosdns/load_rules.yaml"
  - "/usr/local/etc/mosdns/forward.yaml"

plugins:
  # IP 优选，需要定期修改，最好填写 2-4 个
  - tag: blackhole_akamai_ipv4 # 替换部分 AKAMAI 域名 IP，详见 https://raw.githubusercontent.com/Teacher-c/clash/main/data/Akamai_ipv4.txt
    type: sequence
    args:
      - exec: black_hole 104.84.150.173 104.84.150.180 23.200.143.19 # best_akamai_ipv4（定期更新）
      - exec: ttl 3600-0
      - exec: accept

  - tag: blackhole_akamai_ipv6
    type: sequence
    args:
      - exec: black_hole 2600:140b:1000::1730:d5ab 2600:140b:1000::1730:d5ce # best_akamai_ipv6（定期更新）
      - exec: ttl 3600-0
      - exec: accept

  - tag: blackhole_cachefly_ipv4
    type: sequence
    args:
      - exec: black_hole 205.234.175.0 # best_cachefly_ipv4
      - exec: ttl 3600-0
      - exec: accept

  - tag: blackhole_cloudflare_ipv4
    type: sequence
    args:
      - exec: black_hole 104.17.7.198 104.17.61.114 162.159.0.195 162.159.7.75 # best_cloudflare_ipv4
      - exec: ttl 3600-0
      - exec: accept

  - tag: blackhole_cloudflare_ipv6
    type: sequence
    args:
      - exec: black_hole 2a06:98c1:310f::e0c0:131c:2cb3 2a06:98c1:310f::ee3c:1d43:fc2e:6f6c # best_cloudflare_ipv6
      - exec: ttl 3600-0
      - exec: accept

  - tag: blackhole_cloudfront_ipv4
    type: sequence
    args:
      - exec: black_hole 18.172.26.139 18.172.28.94 52.84.151.126 52.84.228.48 # best_cloudfront_ipv4
      - exec: ttl 3600-0
      - exec: accept

  - tag: blackhole_cloudfront_ipv6
    type: sequence
    args:
      - exec: black_hole 2600:9000:20e9:1edf:3560:977b:c990:1f75 2600:9000:20e9:1edf:35c0:29ed:b6ac:7b3b # best_cloudfront_ipv6
      - exec: ttl 3600-0
      - exec: accept

  - tag: blackhole_sucuri_ipv4
    type: sequence
    args:
      - exec: black_hole 192.88.134.24 192.88.134.30 # best_sucuri_ipv4
      - exec: ttl 3600-0
      - exec: accept

  - tag: blackhole_ghs_ipv4
    type: sequence
    args:
      - exec: black_hole 142.250.196.243 # best_ghs_ipv4
      - exec: ttl 3600-0
      - exec: accept

  - tag: blackhole_ghs_ipv6
    type: sequence
    args:
      - exec: black_hole 2404:6800:4004:821::2013 # best_ghs_ipv6
      - exec: ttl 3600-0
      - exec: accept

  - tag: blackhole_cdn77_ipv6
    type: sequence
    args:
      - exec: black_hole ::0 # 屏蔽 IPv6，如有需要可替换为优选 IPv6 地址
      - exec: ttl 3600-0
      - exec: accept

  - tag: change_cdn_ip_akamai
    type: sequence
    args:
      - matches:
          - cname akamai.net akamaized.net
          - qtype 1
          - has_wanted_ans
        exec: jump blackhole_akamai_ipv4
      - matches:
          - resp_ip $akamai_ipv4
          - qtype 1
          - has_wanted_ans
        exec: jump blackhole_akamai_ipv4
      - matches:
          - cname akamai.net akamaized.net
          - qtype 28
          - has_wanted_ans
        exec: jump blackhole_akamai_ipv6
      - exec: return

  - tag: change_cdn_ip # https://github.com/XIU2/CloudflareSpeedTest/discussions/317
    type: sequence
    args:
      - matches:
          - cname full:custom.crisp.help pacloudflare.com cc-ecdn.net
        exec: return
      - matches:
          - qtype 1
          - resp_ip $cloudflare_ipv4
        exec: jump blackhole_cloudflare_ipv4
      - matches:
          - qtype 1
          - resp_ip $cloudfront_ipv4
        exec: jump blackhole_cloudfront_ipv4
      - matches:
          - qtype 1
          - cname cloudfront.net
        exec: jump blackhole_cloudfront_ipv4
      - matches:
          - qtype 1
          - resp_ip $cachefly_ipv4
        exec: jump blackhole_cachefly_ipv4
      - matches:
          - qtype 1
          - resp_ip $sucuri_ipv4
        exec: jump blackhole_sucuri_ipv4
      - matches:
          - qtype 1
          - cname full:ghs.googlehosted.com
        exec: jump blackhole_ghs_ipv4
      - matches:
          - qtype 28
          - resp_ip $cloudflare_ipv6
        exec: jump blackhole_cloudflare_ipv6
      - matches:
          - qtype 28
          - resp_ip $cloudfront_ipv6
        exec: jump blackhole_cloudfront_ipv6
      - matches:
          - qtype 28
          - has_wanted_ans
          - cname cloudfront.net
        exec: jump blackhole_cloudfront_ipv6
      - matches:
          - qtype 28
          - has_wanted_ans
          - qname regexp:.+\.rsc\.cdn77\.org$
        exec: jump blackhole_cdn77_ipv6
      - matches:
          - qtype 28
          - has_wanted_ans
          - cname rsc.cdn77.org
        exec: jump blackhole_cdn77_ipv6
      - matches:
          - qtype 28
          - cname full:ghs.googlehosted.com
        exec: jump blackhole_ghs_ipv6
      - exec: return

  - tag: gfw_sequence # 处理 GFW 域名
    type: sequence
    args:
      - exec: jump remote_sequence
      - exec: jump change_cdn_ip_akamai
      - exec: jump change_cdn_ip
      - exec: accept

  - tag: default_sequence # 默认使用 fallback
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: jump remote_sequence
      - exec: jump change_cdn_ip_akamai
      - exec: jump change_cdn_ip
      - matches:
          - has_resp
        exec: accept
      - exec: return

  - tag: default_sequence_original # 使用 fallback，不替换 CDN IP
    type: sequence
    args:
      - exec: jump remote_sequence
      - exec: accept

  - tag: banned_sequence
    type: sequence
    args:
      - exec: debug_print "DNS poisoning detected"
      - exec: jump default_sequence

  - tag: local_sequence
    type: sequence
    args:
      - exec: $forward_local
      - exec: jump has_resp_sequence
      - exec: jump change_cdn_ip_akamai
      - exec: jump change_cdn_ip
      - exec: accept

  - tag: ali_sequence_ipv4
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $forward_alidns
      - exec: jump has_resp_sequence
      - exec: jump change_cdn_ip_akamai
      - exec: jump change_cdn_ip
      - exec: accept

  - tag: tencent_sequence_ipv4
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $forward_local          # 原 $forward_dnspod 替换为 $forward_local
      - exec: jump has_resp_sequence
      - exec: jump change_cdn_ip_akamai
      - exec: jump change_cdn_ip
      - exec: accept

  - tag: ali_sequence_jp
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $ecs_jp
      - exec: $forward_alidns
      - exec: jump change_cdn_ip_akamai
      - exec: jump change_cdn_ip
      - exec: accept

  - tag: tencent_sequence_sjc
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $ecs_sjc
      - exec: $forward_local          # 原 $forward_dnspod 替换为 $forward_local
      - exec: jump change_cdn_ip_akamai
      - exec: jump change_cdn_ip
      - exec: accept

  - tag: tencent_sequence_lax
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $ecs_lax
      - exec: $forward_local          # 原 $forward_dnspod 替换为 $forward_local
      - exec: jump change_cdn_ip_akamai
      - exec: jump change_cdn_ip
      - exec: accept

  - tag: main
    type: sequence
    args:
      - matches:
          - qtype 65
        exec: reject 3

      - exec: $redirect
      - exec: $hosts
      - exec: jump has_resp_sequence
      - exec: $hosts_fastly
      - exec: jump has_resp_sequence
      - exec: $hosts_akamai
      - exec: jump has_resp_sequence

      - matches:
          - qname $privatelist
        exec: reject 5

      - matches:
          - qname $whitelist
        exec: $forward_local
      - exec: ttl 5-180
      - exec: jump has_resp_sequence

      - matches:
          - qname $blocklist
        exec: reject 5

      - exec: $cache_0
      - exec: jump has_resp_sequence

      - matches:
          - qname $ipv6list
        exec: jump remote_sequence_ipv6

      - matches:
          - qname $originallist
        exec: jump default_sequence_original

      - matches:
          - qname $greylist
        exec: jump default_sequence

      - matches:
          - qname $jp_dns_list $akamailist
        exec: jump ali_sequence_jp

      - matches:
          - qname $us_dns_list
        exec: jump tencent_sequence_lax

      - matches:
          - qname $cdnlist apple.com icloud.com live.com live.net msftconnecttest.com office365.com office.com outlook.com trafficmanager.net xbox.com
        exec: jump tencent_sequence_ipv4

      - matches:
          - qname $gfwlist
        exec: jump gfw_sequence

      - matches:
          - qname $geosite_cn
        exec: jump local_sequence

      - matches:
          - resp_ip $banned_ip
        exec: jump banned_sequence
      - exec: jump change_cdn_ip
      - exec: jump default_sequence
      - exec: accept

  - tag: udp_server
    type: udp_server
    args:
      entry: main
      listen: ":5335"

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main
      listen: ":5335"
      idle_timeout: 10

  - tag: "http_server"
    type: "http_server"
    args:
      entries:
        - path: /dns-query
          exec: main
      src_ip_header: "X-Forwarded-For"
      listen: :5443
      idle_timeout: 30